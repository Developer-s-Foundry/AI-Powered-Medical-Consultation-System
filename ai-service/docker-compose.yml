version: "3.9"

services:
  # ================================
  # AI Service Application
  # ================================
  ai-service-app:
    build:
      context: .
      dockerfile: dockerfile
    container_name: ai-service
    ports:
      - "${SERVER_PORT:-3003}:3000"
    environment:
      NODE_ENV: ${NODE_ENV}
      DB_PORT: ${DB_PORT}
      DB_HOST: ${DB_HOST}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: ${REDIS_DB}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET}
      GATEWAY_SECRET_KEY: ${GATEWAY_SECRET_KEY}
      RABBITMQ_URL: ${RABBITMQ_URL}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE}
      AUTH_ROUTING_KEY: ${AUTH_ROUTING_KEY}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      PAYSTACK_SECRET_KEY: ${PAYSTACK_SECRET_KEY}
      PAYSTACK_BASE_URL: ${PAYSTACK_BASE_URL}
      SOCKET_JWT_SECRET: ${SOCKET_JWT_SECRET}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_API_URL: ${GEMINI_API_URL}
    depends_on:
      postgres-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - microservice-network

  # ================================
  # PostgreSQL Database
  # ================================
  postgres-db:
    image: postgres:15-alpine
    container_name: ai-service-db
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "${DB_PORT:-5432}:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - microservice-network

  # ================================
  # Redis
  # ================================
  redis:
    image: redis:7-alpine
    container_name: ai-service-redis
    ports:
      - "6380:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - microservice-network

  # ================================
  # RabbitMQ
  # ================================
  ai-service-rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ai-service-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5674:5672"
      - "15674:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - microservice-network

# ================================
# Volumes
# ================================
volumes:
  postgres_data:
    name: ai-service-postgres-data
    driver: local
  redis_data:
    name: ai-service-redis-data
    driver: local
  rabbitmq_data:
    name: ai-service-rabbitmq-data
    driver: local

# ================================
# Networks
# ================================
networks:
  microservice-network:
    name: microservice-network
    driver: bridge
