version: "3.9"

services:
  user-profile-service:
    build:
      context: .
      target: development
      dockerfile: dockerfile
    container_name: userprofile-service
    ports:
      - "${PORT:-3007}:3007"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - profile-network
      - microservice-network

  postgres:
    image: postgres:15-alpine
    container_name: healthbridge-profiles-db
    environment:
      POSTGRES_DB: healthbridge_profiles
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5437:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - profile-network

  redis:
    image: redis:7-alpine
    container_name: healthbridge-redis
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - profile-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: healthbridge-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5673:5672"
      - "15673:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - profile-network

volumes:
  postgres_data:
    name: healthbridge-profiles-db-data
    driver: local
  redis_data:
    name: healthbridge-redis-data
    driver: local
  rabbitmq_data:
    name: healthbridge-rabbitmq-data
    driver: local

networks:
  profile-network:
    driver: bridge
  microservice-network:
    name: microservice-network
    driver: bridge
